<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Nimcode — Coming Soon</title>
  <meta name="description" content="Nimcode – Weblösungen & kleine digitale Tools. Coming soon." />
  <meta name="theme-color" content="#0b1220" />
  <style>
    :root{
      --bg:#0b1220;
      --card:#0f1a2e;
      --text:#e8eefc;
      --muted:#aab6d3;
      --line:rgba(255,255,255,.10);
      --btn:#ffffff;
      --btnText:#0b1220;
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      color:var(--text);
      background:
        radial-gradient(900px 500px at 20% 10%, rgba(90,120,255,.20), transparent 60%),
        radial-gradient(800px 450px at 85% 20%, rgba(0,200,255,.14), transparent 60%),
        radial-gradient(900px 500px at 50% 90%, rgba(90,120,255,.14), transparent 60%),
        var(--bg);
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:24px;
    }
    .wrap{width:min(900px,100%);display:grid;gap:20px;}
    .brand{display:flex;align-items:center;gap:12px;}
    .logo{
      width:44px;height:44px;border-radius:14px;
      background:rgba(255,255,255,.08);
      border:1px solid var(--line);
      display:grid;place-items:center;
      font-weight:700;
    }
    h1{margin:0 0 10px;font-size:clamp(28px,4vw,42px);}
    p{color:var(--muted);max-width:600px;line-height:1.6;}
    .card{
      background:rgba(15,26,46,.8);
      border:1px solid var(--line);
      border-radius:20px;
      padding:30px;
      backdrop-filter:blur(10px);
    }
    .btn{
      display:inline-block;
      margin-top:15px;
      padding:10px 16px;
      border-radius:14px;
      text-decoration:none;
      font-weight:600;
      background:#fff;
      color:#0b1220;
    }
    footer{
      margin-top:20px;
      font-size:13px;
      color:var(--muted);
    }
    footer a{color:#fff;text-decoration:none;}
    footer a:hover{text-decoration:underline;}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="brand">
      <div class="logo">N</div>
      <div>
        <strong>Nimcode</strong><br>
        <span style="color:#aab6d3;">Weblösungen & kleine digitale Tools</span>
      </div>
    </div>

    <div class="card">
      <h1>Coming Soon</h1>
      <p>
        Nimcode entwickelt klare, effiziente Weblösungen und kleine digitale Produkte.
        Wir arbeiten gerade an unserem Launch.
      </p>

      <a class="btn" href="mailto:info@nimcode.de">Kontakt aufnehmen</a>
      <br><br>
      <a href="https://www.instagram.com/nimcode.it/" target="_blank">
        Instagram besuchen
      </a>
    </div>

    <footer>
      © <span id="y"></span> Nimcode —
      <a href="impressum.html">Impressum</a> •
      <a href="datenschutz.html">Datenschutz</a><br>
      info@nimcode.de
    </footer>
  </div>

<script>
document.getElementById("y").textContent = new Date().getFullYear();
</script>
</body>
</html>
