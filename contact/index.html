<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kontakt – nimcode</title>
  <meta name="description" content="Kontaktseite von nimcode mit E-Mail, WhatsApp, Telefon und Kontakt speichern." />
  <style>
    :root {
      --petrol: #0f3d3e;
      --petrol-soft: #4f6f70;
      --bg: #f4f6f7;
      --text: #0e1114;
      --white: #ffffff;
      --border: #d9e1e1;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Inter, Arial, Helvetica, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .card {
      width: 100%;
      max-width: 460px;
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 32px 24px;
      box-shadow: 0 10px 30px rgba(15, 61, 62, 0.06);
    }

    .logo {
      font-size: 2.3rem;
      font-weight: 700;
      line-height: 1;
      letter-spacing: -0.04em;
      color: var(--petrol);
      text-align: center;
      margin-bottom: 20px;
    }

    .subtitle {
      text-align: center;
      color: var(--petrol-soft);
      font-size: 0.98rem;
      margin-bottom: 28px;
    }

    .person {
      text-align: center;
      margin-bottom: 28px;
    }

    .person h1 {
      margin: 0 0 8px;
      font-size: 1.8rem;
      line-height: 1.1;
      letter-spacing: -0.03em;
      color: var(--text);
    }

    .person p {
      margin: 0;
      font-size: 1rem;
      color: var(--petrol-soft);
    }

    .actions {
      display: grid;
      gap: 12px;
    }

    .btn {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      min-height: 54px;
      padding: 14px 18px;
      border-radius: 14px;
      text-decoration: none;
      font-weight: 600;
      font-size: 1rem;
      transition: transform 0.15s ease, background-color 0.15s ease, border-color 0.15s ease;
      border: 1px solid transparent;
    }

    .btn:hover {
      transform: translateY(-1px);
    }

    .btn-primary {
      background: var(--petrol);
      color: var(--white);
    }

    .btn-primary:hover {
      background: #145b5c;
    }

    .btn-secondary {
      background: var(--white);
      color: var(--petrol);
      border-color: var(--border);
    }

    .btn-secondary:hover {
      border-color: var(--petrol-soft);
      background: #fafcfc;
    }

    .meta {
      margin-top: 24px;
      text-align: center;
      font-size: 0.92rem;
      color: var(--petrol-soft);
      line-height: 1.6;
    }

    .meta a {
      color: inherit;
      text-decoration: none;
    }

    @media (max-width: 480px) {
      body {
        padding: 16px;
      }

      .card {
        padding: 28px 18px;
        border-radius: 18px;
      }

      .logo {
        font-size: 2rem;
      }

      .person h1 {
        font-size: 1.55rem;
      }
    }
  </style>
</head>
<body>
  <main class="card">
    <div class="logo">nimcode</div>
    <div class="subtitle">Kontakt aufnehmen</div>

    <section class="person">
      <h1>Manar Sras</h1>
      <p>IT &amp; Web Solutions</p>
    </section>

    <section class="actions">
      <a class="btn btn-primary" href="/nimcode-contact.vcf" download>
        Kontakt speichern
      </a>

      <a class="btn btn-secondary" href="https://wa.me/4915226867404" target="_blank" rel="noopener noreferrer">
        WhatsApp
      </a>

      <a class="btn btn-secondary" href="mailto:info@nimcode.de">
        E-Mail senden
      </a>

      <a class="btn btn-secondary" href="tel:+4915226867404">
        Anrufen
      </a>

      <a class="btn btn-secondary" href="https://nimcode.de" target="_blank" rel="noopener noreferrer">
        Website besuchen
      </a>
    </section>

    <div class="meta">
      <div><a href="mailto:info@nimcode.de">info@nimcode.de</a></div>
      <div><a href="tel:+4915226867404">+49 1522 6867404</a></div>
      <div><a href="https://nimcode.de" target="_blank" rel="noopener noreferrer">nimcode.de</a></div>
    </div>
  </main>
</body>
</html>
