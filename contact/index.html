<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kontakt – nimcode</title>
  <meta name="description" content="Kontaktseite von nimcode mit E-Mail, WhatsApp, Telefon und Kontakt speichern." />
  <style>
    :root {
      --petrol: #0f3d3e;
      --petrol-soft: #4f6f70;
      --bg: #f3f5f6;
      --card: rgba(255, 255, 255, 0.88);
      --text: #0e1114;
      --muted: #6c7a7b;
      --line: rgba(15, 61, 62, 0.10);
      --white: #ffffff;
    }

    * {
      box-sizing: border-box;
    }

    html {
      -webkit-text-size-adjust: 100%;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Inter, Arial, Helvetica, sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(15, 61, 62, 0.08), transparent 28%),
        radial-gradient(circle at bottom right, rgba(15, 61, 62, 0.05), transparent 30%),
        var(--bg);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .wrap {
      width: 100%;
      max-width: 460px;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 28px;
      padding: 28px 20px 20px;
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      box-shadow:
        0 10px 30px rgba(15, 61, 62, 0.06),
        0 1px 0 rgba(255,255,255,0.6) inset;
      animation: fadeUp 0.55s ease-out both;
    }

    .brand {
      text-align: center;
      margin-bottom: 22px;
    }

    .logo {
      width: 88px;
      height: 88px;
      object-fit: cover;
      border-radius: 22px;
      display: block;
      margin: 0 auto 16px;
      box-shadow: 0 8px 20px rgba(15, 61, 62, 0.12);
      animation: softFade 0.7s ease-out both;
    }

    .logo-text {
      font-size: 2.2rem;
      font-weight: 700;
      line-height: 1;
      letter-spacing: -0.05em;
      color: var(--petrol);
      margin: 0;
      animation: softFade 0.7s ease-out both;
    }

    .subtitle {
      margin: 10px 0 0;
      font-size: 0.95rem;
      color: var(--petrol-soft);
    }

    .profile {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      margin-bottom: 26px;
    }

    .person {
      text-align: center;
    }

    .person h1 {
      margin: 0;
      font-size: 1.55rem;
      line-height: 1.1;
      letter-spacing: -0.04em;
    }

    .person p {
      margin: 8px 0 0;
      color: var(--muted);
      font-size: 0.98rem;
    }

    .actions {
      display: grid;
      gap: 12px;
      margin-bottom: 22px;
    }

    .btn {
      display: flex;
      align-items: center;
      gap: 12px;
      width: 100%;
      min-height: 58px;
      padding: 14px 16px;
      border-radius: 18px;
      text-decoration: none;
      font-size: 1rem;
      font-weight: 600;
      transition: transform 0.18s ease, box-shadow 0.18s ease, background-color 0.18s ease, border-color 0.18s ease;
      border: 1px solid transparent;
    }

    .btn:hover {
      transform: translateY(-2px);
    }

    .btn-primary {
      background: var(--petrol);
      color: var(--white);
      box-shadow: 0 8px 18px rgba(15, 61, 62, 0.16);
    }

    .btn-primary:hover {
      background: #145b5c;
    }

    .btn-secondary {
      background: rgba(255,255,255,0.82);
      color: var(--text);
      border-color: var(--line);
    }

    .btn-secondary:hover {
      border-color: rgba(15, 61, 62, 0.22);
      box-shadow: 0 8px 18px rgba(15, 61, 62, 0.06);
    }

    .icon {
      width: 22px;
      height: 22px;
      flex: 0 0 22px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }

    .icon svg {
      width: 22px;
      height: 22px;
      display: block;
    }

    .btn-primary .icon svg {
      stroke: currentColor;
    }

    .btn-secondary .icon svg {
      stroke: var(--petrol);
    }

    .meta {
      border-top: 1px solid var(--line);
      padding-top: 18px;
      text-align: center;
      color: var(--muted);
      font-size: 0.93rem;
      line-height: 1.8;
    }

    .meta a {
      color: inherit;
      text-decoration: none;
    }

    .footer-note {
      text-align: center;
      margin-top: 14px;
      font-size: 0.8rem;
      color: #8a9596;
    }

    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(18px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes softFade {
      from {
        opacity: 0;
        transform: scale(0.98);
      }
      to {
        opacity: 1;
        transform: scale(1);
      }
    }

    @media (max-width: 420px) {
      body {
        padding: 14px;
      }

      .card {
        border-radius: 24px;
        padding: 24px 16px 18px;
      }

      .logo {
        width: 76px;
        height: 76px;
        border-radius: 18px;
      }

      .logo-text {
        font-size: 2rem;
      }

      .person h1 {
        font-size: 1.4rem;
      }

      .btn {
        min-height: 56px;
        border-radius: 16px;
      }

    }
  </style>
</head>
